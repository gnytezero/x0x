# x0x Node Configuration - Singapore (saorsa-8)
# Location: Singapore (DigitalOcean SGP1)
# Public IPv4: 152.42.210.67
# Public IPv6: 2400:6180:0:d2:0:2:d30b:d000

# QUIC transport bind address (dual-stack: accepts both IPv4 and IPv6)
bind_address = "[::]:5483"

# Health/metrics endpoint (localhost only)
health_address = "127.0.0.1:12600"

# Machine identity key
machine_key_path = "/var/lib/x0x/machine.key"

# Data directory
data_dir = "/var/lib/x0x/data"

# Bootstrap roles
coordinator = true
reflector = true
relay = true

# Known peers (other 5 bootstrap nodes — IPv4 addresses for cross-node connectivity)
known_peers = [
    "142.93.199.50:5483",      # saorsa-2 (NYC)
    "147.182.234.192:5483",    # saorsa-3 (SFO)
    "65.21.157.229:5483",      # saorsa-6 (Helsinki)
    "116.203.101.172:5483",    # saorsa-7 (Nuremberg)
    "170.64.176.102:5483",     # saorsa-9 (Sydney)
]

# Logging
log_level = "info"

# Self-update configuration
[update]
enabled = true
check_interval_seconds = 3600
rollout_window_minutes = 120
stop_on_upgrade = true
repo = "saorsa-labs/x0x"
